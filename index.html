<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <title>Pink Premium Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<audio id="clickSound" src="click.mp3"></audio>

<div class="calculator">

  <div class="top-section">
   <button id="historyBtn" class="history-button">
  HISTORY
</button>
    <div class="display-wrapper">
      <input type="text" id="display" readonly>
    </div>
  </div>

  <div class="buttons">

    <button class="function" data-value="RM">RM</button>
    <button class="function" data-value="M+">M+</button>
    <button class="function" data-value="M-">M-</button>
    <button class="function" data-value="%">%</button>

    <button class="function" data-value="C">C</button>
    <button class="function" data-value="DEL">DEL</button>
    <button class="operator" data-value="/">÷</button>
    <button class="operator" data-value="*">×</button>

    <button data-value="7">7</button>
    <button data-value="8">8</button>
    <button data-value="9">9</button>
    <button class="operator" data-value="-">−</button>

    <button data-value="4">4</button>
    <button data-value="5">5</button>
    <button data-value="6">6</button>
    <button class="operator" data-value="+">+</button>

    <button data-value="1">1</button>
    <button data-value="2">2</button>
    <button data-value="3">3</button>
    <button class="equal">=</button>

    <button class="zero" data-value="0">0</button>
    <button data-value=".">.</button>
    <button class="operator" data-value="neg">±</button>
  </div>
  
  <div id="historyPanel" class="history-panel">
  
  <div class="history-header">
    <h2>History</h2>
    <button id="closeHistory">✖</button>
  </div>

  <div id="historyList" class="history-list"></div>

  <button id="clearHistory" class="clear-history-btn">
    Clear All
  </button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
